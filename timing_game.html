<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>タイミングゲーム</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    color: #fff;
    user-select: none;
  }
  h1 { font-size: 2rem; margin-bottom: 8px; letter-spacing: 2px; }
  .subtitle { color: #aaa; margin-bottom: 40px; font-size: 0.95rem; }

  .game-area {
    background: #16213e;
    border-radius: 16px;
    padding: 40px 50px;
    width: 500px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }

  /* ===== バー ===== */
  .bar-wrapper {
    position: relative;
    width: 100%;
    height: 36px;
    background: #0a0a1a;
    border-radius: 18px;
    overflow: hidden;
    border: 2px solid #333;
    margin-bottom: 24px;
  }

  /* 水色ゾーン */
  .zone {
    position: absolute;
    top: 0;
    height: 100%;
    background: rgba(0, 200, 255, 0.35);
    border-left: 2px solid #00c8ff;
    border-right: 2px solid #00c8ff;
    transition: left 0.1s, width 0.1s;
  }

  /* 白いインジケーター */
  .indicator {
    position: absolute;
    top: 4px;
    width: 14px;
    height: 28px;
    background: #fff;
    border-radius: 7px;
    box-shadow: 0 0 10px rgba(255,255,255,0.8);
    transition: none;
  }

  /* ===== ボタン ===== */
  #press-btn {
    display: block;
    width: 100%;
    padding: 18px;
    font-size: 1.3rem;
    font-weight: bold;
    letter-spacing: 3px;
    background: linear-gradient(135deg, #0f3460, #1a6bbd);
    color: #fff;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: transform 0.07s, box-shadow 0.07s;
    box-shadow: 0 4px 16px rgba(0,100,255,0.3);
  }
  #press-btn:active { transform: scale(0.96); }
  #press-btn:disabled { opacity: 0.5; cursor: default; }

  /* ===== 結果表示 ===== */
  .result {
    text-align: center;
    min-height: 64px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
  }
  .result-text {
    font-size: 2rem;
    font-weight: bold;
    opacity: 0;
    transform: scale(0.5);
    transition: opacity 0.15s, transform 0.15s;
  }
  .result-text.show {
    opacity: 1;
    transform: scale(1);
  }
  .result-text.hit  { color: #00ffaa; text-shadow: 0 0 20px #00ffaa; }
  .result-text.miss { color: #ff4466; text-shadow: 0 0 20px #ff4466; }

  /* ===== スコア ===== */
  .stats {
    display: flex;
    justify-content: space-around;
    margin-top: 24px;
    font-size: 0.9rem;
    color: #aaa;
  }
  .stats span { font-size: 1.4rem; font-weight: bold; color: #fff; display: block; text-align: center; }

  /* ===== 設定 ===== */
  .settings {
    margin-top: 30px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .settings label { font-size: 0.85rem; color: #aaa; }
  .settings input[type=range] { width: 100%; accent-color: #00c8ff; }
  .setting-row { display: flex; justify-content: space-between; align-items: center; }
  .setting-val { color: #00c8ff; font-weight: bold; font-size: 0.9rem; width: 50px; text-align: right; }
</style>
</head>
<body>

<h1>⚡ タイミングゲーム</h1>
<p class="subtitle">白いバーが水色ゾーンに入ったらボタンを押せ！</p>

<div class="game-area">
  <div class="result">
    <div class="result-text" id="result-text">-</div>
  </div>

  <div class="bar-wrapper" id="bar">
    <div class="zone" id="zone"></div>
    <div class="indicator" id="indicator"></div>
  </div>

  <button id="press-btn" onclick="pressButton()">PRESS！ &nbsp;[Space]</button>

  <div class="stats">
    <div>HIT<span id="hit-count">0</span></div>
    <div>MISS<span id="miss-count">0</span></div>
    <div>連続HIT<span id="streak">0</span></div>
    <div>精度<span id="accuracy">-%</span></div>
  </div>

  <div class="settings">
    <div class="setting-row">
      <label>バー速度</label>
      <input type="range" id="speed-slider" min="1" max="10" value="4" oninput="updateSpeed(this.value)">
      <span class="setting-val" id="speed-val">4</span>
    </div>
    <div class="setting-row">
      <label>ゾーン幅</label>
      <input type="range" id="zone-slider" min="5" max="40" value="18" oninput="updateZone(this.value)">
      <span class="setting-val" id="zone-val">18%</span>
    </div>
  </div>
</div>

<script>
const bar       = document.getElementById('bar');
const indicator = document.getElementById('indicator');
const zone      = document.getElementById('zone');
const resultEl  = document.getElementById('result-text');

// ===== パラメータ =====
let speedLevel  = 4;          // 1〜10
let zonePct     = 18;         // ゾーン幅 (%)
let zoneLeftPct = 30;         // ゾーン左端位置 (%) — ランダムで変わる

// ===== アニメーション状態 =====
let pos    = 0;        // 0〜1 (indicator位置)
let dir    = 1;        // 1 or -1
let lastTs = null;
let animId = null;

// ===== スコア =====
let hits = 0, misses = 0, streak = 0;

function getSpeed() {
  // speedLevel 1〜10 → pixel/sec をバー幅比で
  return 0.15 + speedLevel * 0.09; // fraction of bar per second
}

function updateZonePosition() {
  // ゾーンが画面外にはみ出さないよう制限
  const maxLeft = 100 - zonePct - 2;
  zoneLeftPct = Math.random() * maxLeft * 0.6 + 10;
  zone.style.left  = zoneLeftPct + '%';
  zone.style.width = zonePct + '%';
}

function indicatorInZone() {
  // インジケーター中心がゾーン内かチェック
  const indicW = 14;
  const barW   = bar.clientWidth;
  const center = pos * (barW - indicW) + indicW / 2;
  const zLeft  = zoneLeftPct / 100 * barW;
  const zRight = zLeft + zonePct / 100 * barW;
  return center >= zLeft && center <= zRight;
}

function animate(ts) {
  if (!lastTs) lastTs = ts;
  const dt = (ts - lastTs) / 1000;
  lastTs = ts;

  pos += dir * getSpeed() * dt;

  if (pos >= 1) { pos = 1; dir = -1; }
  if (pos <= 0) { pos = 0; dir =  1; }

  const barW  = bar.clientWidth;
  const indicW = 14;
  indicator.style.left = (pos * (barW - indicW)) + 'px';

  // ゾーンに入ったとき光らせる
  if (indicatorInZone()) {
    indicator.style.boxShadow = '0 0 16px rgba(0,200,255,0.9)';
    indicator.style.background = '#00eeff';
  } else {
    indicator.style.boxShadow = '0 0 10px rgba(255,255,255,0.8)';
    indicator.style.background = '#fff';
  }

  animId = requestAnimationFrame(animate);
}

function showResult(type, text) {
  resultEl.className = 'result-text';
  void resultEl.offsetWidth; // reflow
  resultEl.textContent = text;
  resultEl.className = 'result-text show ' + type;
}

function pressButton() {
  const hit = indicatorInZone();

  if (hit) {
    hits++;
    streak++;
    const msgs = ['PERFECT!', 'GREAT!', 'NICE!', 'EXCELLENT!'];
    showResult('hit', streak >= 3 ? `🔥 ${streak}連続HIT！` : msgs[Math.min(streak-1, msgs.length-1)]);
    // ゾーンを次の位置へ
    updateZonePosition();
  } else {
    misses++;
    streak = 0;
    showResult('miss', 'MISS...');
  }

  const total = hits + misses;
  document.getElementById('hit-count').textContent   = hits;
  document.getElementById('miss-count').textContent  = misses;
  document.getElementById('streak').textContent      = streak;
  document.getElementById('accuracy').textContent    = Math.round(hits / total * 100) + '%';
}

function updateSpeed(v) {
  speedLevel = +v;
  document.getElementById('speed-val').textContent = v;
}

function updateZone(v) {
  zonePct = +v;
  document.getElementById('zone-val').textContent = v + '%';
  updateZonePosition();
}

// Space キーでも押せる
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'Enter') {
    e.preventDefault();
    pressButton();
  }
});

// 初期化
updateZonePosition();
requestAnimationFrame(animate);
</script>
</body>
</html>
