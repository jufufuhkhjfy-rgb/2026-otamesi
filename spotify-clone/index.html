<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Player</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- カスタムタイトルバー -->
  <div class="titlebar">
    <div class="titlebar-drag-region"></div>
    <div class="titlebar-title">
      <svg class="logo-icon" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm4.586 14.424a.622.622 0 01-.857.207c-2.348-1.435-5.304-1.76-8.785-.964a.622.622 0 11-.277-1.215c3.809-.87 7.076-.496 9.712 1.115a.622.622 0 01.207.857zm1.223-2.722a.779.779 0 01-1.072.257c-2.687-1.652-6.785-2.131-9.965-1.166a.778.778 0 01-.973-.519.781.781 0 01.52-.972c3.632-1.102 8.147-.568 11.233 1.328a.779.779 0 01.257 1.072zm.105-2.835c-3.223-1.914-8.54-2.09-11.618-1.156a.935.935 0 11-.543-1.79c3.532-1.073 9.404-.866 13.115 1.338a.936.936 0 01-1.954 1.608z"/>
      </svg>
      Music Player
    </div>
    <div class="titlebar-controls">
      <button class="titlebar-btn" id="btn-minimize">&#8211;</button>
      <button class="titlebar-btn" id="btn-maximize">&#9633;</button>
      <button class="titlebar-btn close" id="btn-close">&#10005;</button>
    </div>
  </div>

  <div class="app-container">
    <!-- サイドバー -->
    <aside class="sidebar">
      <div class="sidebar-top">
        <button class="sidebar-btn active" id="nav-library">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2 4l.01 16H22V4H2zm8 11H5v-2h5v2zm7-4H5v-2h12v2zm0-4H5V5h12v2z"/></svg>
          ライブラリ
        </button>
        <button class="sidebar-btn" id="nav-favorites">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
          お気に入り
        </button>
        <button class="sidebar-btn" id="btn-add-folder">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 6h-8l-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm2 12H4V8h16v10zm-8-1h2v-3h3v-2h-3V9h-2v3H9v2h3z"/></svg>
          フォルダ追加
        </button>
      </div>

      <div class="playlist-section">
        <div class="playlist-header">プレイリスト</div>
        <div id="playlist-list">
          <div class="playlist-empty">フォルダを追加してください</div>
        </div>
      </div>
    </aside>

    <!-- メインコンテンツ -->
    <main class="main-content">
      <!-- 検索バー -->
      <div class="search-bar-wrapper">
        <div class="search-bar">
          <svg class="search-icon" viewBox="0 0 24 24" fill="currentColor">
            <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
          </svg>
          <input type="text" id="search-input" placeholder="曲を検索...">
        </div>
      </div>

      <!-- コンテンツエリア -->
      <div class="content-area" id="content-area">
        <!-- ウェルカム画面 -->
        <div class="welcome-screen" id="welcome-screen">
          <div class="welcome-icon">
            <svg viewBox="0 0 100 100" fill="currentColor">
              <circle cx="50" cy="50" r="48" fill="#1DB954"/>
              <path d="M50 15C30.67 15 15 30.67 15 50S30.67 85 50 85 85 69.33 85 50 69.33 15 50 15zm20.77 48.58a3.11 3.11 0 01-4.29 1.04c-11.74-7.18-26.52-8.8-43.92-4.82a3.11 3.11 0 01-1.39-6.07c19.05-4.35 35.39-2.48 48.56 5.57a3.11 3.11 0 011.04 4.28zm5.55-13.17a3.89 3.89 0 01-5.36 1.29C57.39 43.46 33.71 41.24 15.28 46.8a3.89 3.89 0 01-4.86-2.6 3.89 3.89 0 012.6-4.86C33.21 33.07 59.23 35.6 74.04 48.14a3.89 3.89 0 011.28 3.27zm.53-13.72C60.77 28.48 28.55 27.39 13.42 32.16a4.67 4.67 0 01-2.72-8.96C27.54 17.96 62.4 19.22 80.5 30.84a4.67 4.67 0 01-3.65 8.85z" fill="white"/>
            </svg>
          </div>
          <h1>Music Player へようこそ</h1>
          <p>広告なし・完全無料のローカル音楽プレイヤーです</p>
          <button class="btn-primary" id="welcome-add-folder">
            <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M20 6h-8l-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm2 12H4V8h16v10zm-8-1h2v-3h3v-2h-3V9h-2v3H9v2h3z"/></svg>
            音楽フォルダを追加
          </button>
        </div>

        <!-- 曲リスト -->
        <div class="track-list-container" id="track-list-container" style="display:none">
          <div class="track-list-header">
            <span class="col-num">#</span>
            <span class="col-title">タイトル</span>
            <span class="col-album">アルバム/フォルダ</span>
            <span class="col-duration">
              <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67V7z"/></svg>
            </span>
          </div>
          <div class="track-list" id="track-list"></div>
        </div>
      </div>
    </main>
  </div>

  <!-- プレイヤーバー -->
  <div class="player-bar">
    <!-- 現在の曲情報 -->
    <div class="player-info">
      <div class="player-album-art" id="player-album-art">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
      </div>
      <div class="player-track-info">
        <div class="player-track-name" id="player-track-name">曲が選択されていません</div>
        <div class="player-track-artist" id="player-track-artist">--</div>
      </div>
      <button class="player-favorite-btn" id="player-favorite-btn" title="お気に入り">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16.5 3c-1.74 0-3.41.81-4.5 2.09C10.91 3.81 9.24 3 7.5 3 4.42 3 2 5.42 2 8.5c0 3.78 3.4 6.86 8.55 11.54L12 21.35l1.45-1.32C18.6 15.36 22 12.28 22 8.5 22 5.42 19.58 3 16.5 3zm-4.4 15.55l-.1.1-.1-.1C7.14 14.24 4 11.39 4 8.5 4 6.5 5.5 5 7.5 5c1.54 0 3.04.99 3.57 2.36h1.87C13.46 5.99 14.96 5 16.5 5c2 0 3.5 1.5 3.5 3.5 0 2.89-3.14 5.74-7.9 10.05z"/></svg>
      </button>
    </div>

    <!-- 再生コントロール -->
    <div class="player-controls">
      <div class="control-buttons">
        <button class="ctrl-btn" id="btn-shuffle" title="シャッフル">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
        </button>
        <button class="ctrl-btn" id="btn-prev" title="前の曲">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
        </button>
        <button class="ctrl-btn play-btn" id="btn-play-pause" title="再生/一時停止">
          <svg class="icon-play" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          <svg class="icon-pause" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <button class="ctrl-btn" id="btn-next" title="次の曲">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zm2-8.14L11.03 12 8 14.14V9.86zM16 6h2v12h-2z"/></svg>
        </button>
        <button class="ctrl-btn" id="btn-repeat" title="リピート">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
        </button>
      </div>
      <div class="progress-bar-wrapper">
        <span class="time-current" id="time-current">0:00</span>
        <div class="progress-bar" id="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
          <div class="progress-thumb" id="progress-thumb"></div>
        </div>
        <span class="time-total" id="time-total">0:00</span>
      </div>
    </div>

    <!-- 音量コントロール -->
    <div class="player-volume">
      <button class="ctrl-btn" id="btn-mute" title="ミュート">
        <svg class="icon-volume" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
        <svg class="icon-mute" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
      </button>
      <div class="volume-bar" id="volume-bar">
        <div class="volume-fill" id="volume-fill" style="width: 70%"></div>
        <div class="volume-thumb" id="volume-thumb" style="left: 70%"></div>
      </div>
    </div>
  </div>

  <audio id="audio-player"></audio>

  <script src="renderer.js"></script>
</body>
</html>
